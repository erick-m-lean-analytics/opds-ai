services:
  opds-mysql-historian:
    image: mysql:8.0
    container_name: opds-mysql-historian
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: sensei_pass
      MYSQL_DATABASE: production_historian
    volumes:
      - mysql_factory_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  opds-mcp-mysql:
    build: ./mcp-mysql
    container_name: opds-mcp-mysql
    restart: always
    network_mode: host
    environment:
      - MYSQL_HOST=127.0.0.1
      - MYSQL_USER=root
      - MYSQL_PASSWORD=sensei_pass
      - MYSQL_DATABASE=production_historian
    depends_on:
      - opds-mysql-historian

  opds-brain:
    image: ghcr.io/open-webui/open-webui:main
    container_name: opds-brain
    restart: always
    network_mode: host
    volumes:
      - open-webui:/app/backend/data
    environment:
      - WEBUI_PORT=8080
      - OLLAMA_BASE_URL=http://127.0.0.1:11434

  opds-grafana:
    image: grafana/grafana:latest
    container_name: opds-grafana
    restart: always
    network_mode: host
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_PASSWORD=sensei_pass
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - opds-mysql-historian

  opds-metabase:
    image: metabase/metabase:latest
    container_name: opds-metabase
    restart: always
    network_mode: host
    environment:
      - MB_JETTY_PORT=3001
      - MB_DB_TYPE=h2
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - opds-mysql-historian

volumes:
  mysql_factory_data:
  open-webui:
  grafana_data:
  metabase_data:
